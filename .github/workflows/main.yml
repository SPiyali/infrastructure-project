name: GDELT 20-Minute Pipeline

# This tells GitHub to ONLY run when you click the button OR when Cron-Job pings it
on:
  workflow_dispatch: 

jobs:
  run-data-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Libraries
        run: pip install -r requirements.txt
        
      - name: Run main2
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python main2.py
