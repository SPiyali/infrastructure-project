name: GDELT 20-Minute Pipeline

# This tells GitHub to ONLY run when you click the button OR when Cron-Job pings it
on:
  workflow_dispatch: 

jobs:
  run-data-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Libraries
        # We point directly to the file inside the gdelt directory
        run: pip install -r requirements.txt
        
      - name: Run main2
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        # We tell Python to execute the script inside the gdelt directory
        run: python gdelt/main2.py
